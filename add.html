<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkMeter-Add</title>
</head>
<body>
    <header>
         <h1>Add a task</h1>
    </header>
    <main>
        <form>
           <p>
            <label>Enter the task name:</label>
            <input type="text">
           </p>
           <p>
            <label>Enter no of sections: </label>
            <input type="numer">
           </p>
           <p>
            <label>Section name:</label>
            <input type="text">
           </p>
           <p>
            <label>Duration</label>
            <input type="time">
           </p>
           <button type="Submit">Submit</button>
        </form>
        
    </main>
</body>
</html>
